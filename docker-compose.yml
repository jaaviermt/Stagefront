services:
  postgres:
    image: postgres:16-alpine
    container_name: stagefront-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stagefront
      POSTGRES_PASSWORD: stagefront
      POSTGRES_DB: stagefront
    ports:
      - "5432:5432"
    volumes:
      - stagefront_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stagefront -d stagefront"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: stagefront-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - stagefront_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  stagefront_pg_data:
  stagefront_mongo_data:
