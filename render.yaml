services:
  - type: web
    name: stagefront
    env: node
    region: oregon
    plan: free
    buildCommand: >-
      cd frontend && npm ci --include=dev && npm run build &&
      cd ../backend && npm ci --include=dev && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma db push && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stagefront-db
          property: connectionString
      - key: MONGODB_URI
        sync: false          # Set this manually from MongoDB Atlas
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_USER_ID
        value: seed-user-demo

databases:
  - name: stagefront-db
    databaseName: stagefront
    user: stagefront
    region: oregon
    plan: free
